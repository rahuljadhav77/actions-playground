# Example 13: Composite Action
# This workflow demonstrates how to call a composite action.

name: Composite Action Workflow

on:
  push:
    branches:
      - main

jobs:
  run-composite:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Run composite action
        uses: ./github/actions/composite-action
