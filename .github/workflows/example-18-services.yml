# Example 18: Service Containers
# This workflow demonstrates using service containers for tests.

name: Service Containers Workflow

on:
  push:
    branches:
      - main

jobs:
  database-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Wait for Postgres
        run: sleep 15

      - name: Run tests
        run: echo "Running integration tests against Postgres..."
