name: Example 56 - Container Orchestration (Kubernetes)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace
        run: kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image
        run: |
          kubectl set image deployment/app \
            app=${{ needs.build-and-push.outputs.image }} \
            -n production

      - name: Rollout status
        run: kubectl rollout status deployment/app -n production --timeout=5m

      - name: Verify pod health
        run: |
          kubectl get pods -n production
          kubectl logs -n production -l app=app --tail=50

  scale-deployment:
    needs: deploy-to-k8s
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Scale deployment
        run: kubectl scale deployment/app --replicas=3 -n production

      - name: Verify replicas
        run: kubectl get deployment/app -n production

  monitor-k8s:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate deployment report
        run: |
          echo "# Kubernetes Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Active" >> $GITHUB_STEP_SUMMARY
          echo "- Replicas: 3" >> $GITHUB_STEP_SUMMARY
          echo "- Image: Updated" >> $GITHUB_STEP_SUMMARY
          echo "- Health: ✅ All pods running" >> $GITHUB_STEP_SUMMARY
