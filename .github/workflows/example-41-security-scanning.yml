name: Example 41 - Security Scanning & SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
#   schedule:
#     - cron: '0 2 * * *'

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug

  sast-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
          generateSarif: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check for supply chain attacks
        run: |
          npm install npm-audit-resolver
          npx npm-audit-resolver resolve

  container-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myapp:latest .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif

  code-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  security-report:
    runs-on: ubuntu-latest
    needs: [secret-scanning, sast-analysis, dependency-audit, container-scanning, code-scanning]
    if: always()
    steps:
      - name: Generate security report
        run: |
          echo "# Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Scanning: Complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SAST Analysis: Complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Audit: Complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container Scanning: Complete" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CodeQL Analysis: Complete" >> $GITHUB_STEP_SUMMARY
