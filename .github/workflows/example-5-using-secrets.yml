# Example 5: Using Secrets
# This workflow demonstrates how to use GitHub Secrets in a workflow.

name: Using Secrets Workflow

on:
  push:
    branches:
      - main

jobs:
  use-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Print a secret
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "The secret value is $MY_SECRET"