# Example 27: Exit Codes
# This workflow demonstrates handling exit codes and fail-fast behavior.

name: Exit Codes Workflow

on:
  push:
    branches:
      - main

jobs:
  exit-code-job:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Simulate a failing command
        run: |
          echo "This command will fail with exit code 1"
          exit 1
