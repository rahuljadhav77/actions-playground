# Example 6: Matrix Builds
# This workflow demonstrates how to run a job across multiple configurations (matrix builds).

name: Matrix Builds Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [14, 16, 18]

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print environment info
        run: echo "Running on ${{ matrix.os }} with Node.js ${{ matrix.node-version }}"