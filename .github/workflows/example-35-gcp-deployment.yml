name: Example 35 - Deploy to Google Cloud Platform

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  SERVICE_NAME: github-actions-app

jobs:
  deploy-gcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set environment variables
        run: |
          ENV=${{ github.event.inputs.environment || 'staging' }}
          echo "DEPLOYMENT_ENV=$ENV" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=${{ env.DEPLOYMENT_ENV }}

      - name: Get service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Run health checks
        run: |
          for i in {1..10}; do
            curl -f ${{ steps.service-url.outputs.url }}/health && break
            echo "Health check attempt $i/10..."
            sleep 5
          done

      - name: Notify deployment
        run: |
          echo "✅ Deployed to ${{ env.DEPLOYMENT_ENV }}"
          echo "Service URL: ${{ steps.service-url.outputs.url }}"

  deploy-firestore-migration:
    runs-on: ubuntu-latest
    needs: deploy-gcp
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Run Firestore migrations
        run: |
          gcloud firestore databases create \
            --location=${{ env.GCP_REGION }} || true
          echo "Firestore ready"

  notify-deployment:
    runs-on: ubuntu-latest
    needs: deploy-gcp
    if: always()
    steps:
      - name: Post deployment summary
        run: |
          echo "## GCP Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Service: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
