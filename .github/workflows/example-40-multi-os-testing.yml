name: Example 40 - Multi-OS Testing (Windows, macOS, Linux)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
        include:
          - os: ubuntu-latest
            node-version: 18
            coverage: true
          - os: windows-latest
            node-version: 20
            build-type: Release
          - os: macos-latest
            node-version: 22
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          architecture: ${{ matrix.arch || 'x64' }}

      - name: Display environment info
        run: |
          node --version
          npm --version
          echo "OS: ${{ runner.os }}"
          echo "Architecture: ${{ runner.arch }}"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run coverage (Ubuntu only)
        if: matrix.coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

      - name: Platform-specific tests
        run: npm run test:platform:${{ runner.os }}
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-node${{ matrix.node-version }}
          path: test-results/

  compatibility-report:
    runs-on: ubuntu-latest
    needs: test-matrix
    if: always()
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Generate compatibility matrix
        run: |
          echo "# Compatibility Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## OS Compatibility" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Ubuntu Latest" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Windows Latest" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ macOS Latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Node.js Versions" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Node 18" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Node 20" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Node 22" >> $GITHUB_STEP_SUMMARY
