name: Example 61 - Chaos Engineering & Resilience Testing

on:
  push:
    branches: [main]
#   schedule:
#     - cron: '0 2 * * 1'  # Weekly Monday
  workflow_dispatch:

jobs:
  inject-chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Chaos Mesh
        run: |
          echo "Installing Chaos Mesh..."
          curl https://mirrors.chaos-mesh.org/v2.5.1/chaos-mesh-v2.5.1-linux-amd64.tar.gz | tar xz

      - name: Deploy chaos experiments
        run: |
          echo "Deploying chaos scenarios..."
          echo "1. Network latency injection (500ms)"
          echo "2. Pod CPU stress (80% utilization)"
          echo "3. Disk I/O saturation"
          echo "4. Memory pressure"

      - name: Monitor system behavior
        run: |
          echo "Monitoring application under chaos..."
          sleep 60
          echo "Metrics collected"

  validate-resilience:
    runs-on: ubuntu-latest
    steps:
      - name: Check service availability
        run: |
          echo "Service availability during chaos:"
          echo "- Main service: 99.5% uptime"
          echo "- API endpoints: 99.8% uptime"
          echo "- Database: 100% uptime"

      - name: Verify failover mechanisms
        run: |
          echo "Failover test results:"
          echo "- Auto-recovery: ✅ Working"
          echo "- Circuit breaker: ✅ Triggered correctly"
          echo "- Load balancer failover: ✅ Success"

      - name: Analyze error rates
        run: |
          echo "Error rate analysis:"
          echo "- Expected errors: 0.5%"
          echo "- Actual errors: 0.3%"
          echo "- Status: ✅ Within acceptable range"

  cleanup-chaos:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Remove chaos experiments
        run: |
          echo "Cleaning up chaos experiments..."
          echo "Chaos Mesh experiments removed"

      - name: Verify system recovery
        run: |
          echo "System recovery verification:"
          echo "- CPU: Normal"
          echo "- Memory: Normal"
          echo "- Network: Normal"
          echo "- Status: ✅ Fully recovered"

  generate-chaos-report:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate chaos engineering report
        run: |
          echo "# Chaos Engineering Test Report" >> $GITHUB_STEP_SUMMARY
          echo "- Test date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Scenarios tested: 4" >> $GITHUB_STEP_SUMMARY
          echo "- System resilience: ✅ Excellent" >> $GITHUB_STEP_SUMMARY
          echo "- MTTR (Mean Time To Recovery): 45 seconds" >> $GITHUB_STEP_SUMMARY
          echo "- Recommendations: None" >> $GITHUB_STEP_SUMMARY
