# Example 17: Job Dependencies
# This workflow demonstrates using needs to order jobs.

name: Job Dependencies Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Build
        run: echo "Building..."

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Test
        run: echo "Testing after build..."
