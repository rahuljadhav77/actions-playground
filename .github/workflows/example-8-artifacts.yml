# Example 8: Artifacts
# This workflow demonstrates how to upload and download artifacts in GitHub Actions.

name: Artifacts Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Create a build artifact
        run: |
          mkdir -p build
          echo "This is a build artifact" > build/artifact.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-artifact
          path: build/

  download:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: build-artifact

      - name: Display artifact
        run: cat artifact.txt