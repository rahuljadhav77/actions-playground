# Example 21: Tag Trigger
# This workflow demonstrates running on tag creation.

name: Tag Trigger Workflow

on:
  push:
    tags:
      - 'v*'

jobs:
  tag-job:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Print tag name
        run: echo "Tag triggered: ${{ github.ref }}"
