name: Example 52 - Multi-Region Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-once:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.artifact.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build application
        run: npm ci && npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/

      - id: artifact
        run: echo "id=${{ github.run_id }}" >> $GITHUB_OUTPUT

  deploy-us-east:
    needs: build-once
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Deploy to US-East (Virginia)
        run: |
          echo "Deploying to us-east-1..."
          echo "Region: Virginia, USA"
          echo "Status: ✅ Deployed"

  deploy-eu-west:
    needs: build-once
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Deploy to EU-West (Ireland)
        run: |
          echo "Deploying to eu-west-1..."
          echo "Region: Dublin, Ireland"
          echo "Status: ✅ Deployed"

  deploy-ap-southeast:
    needs: build-once
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Deploy to AP-Southeast (Singapore)
        run: |
          echo "Deploying to ap-southeast-1..."
          echo "Region: Singapore"
          echo "Status: ✅ Deployed"

  health-check-all:
    runs-on: ubuntu-latest
    needs: [deploy-us-east, deploy-eu-west, deploy-ap-southeast]
    steps:
      - name: Health check all regions
        run: |
          echo "Checking us-east-1: ✅"
          echo "Checking eu-west-1: ✅"
          echo "Checking ap-southeast-1: ✅"

      - name: Verify global distribution
        run: |
          echo "# Global Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "- US-East: ✅ Online" >> $GITHUB_STEP_SUMMARY
          echo "- EU-West: ✅ Online" >> $GITHUB_STEP_SUMMARY
          echo "- AP-Southeast: ✅ Online" >> $GITHUB_STEP_SUMMARY
