name: Example 54 - Semantic Versioning & Release Management

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version-bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      old-version: ${{ steps.version.outputs.old-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT=${CURRENT#v}
          echo "old-version=$CURRENT" >> $GITHUB_OUTPUT

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case "${{ github.event.inputs.version-bump || 'patch' }}" in
            major)
              NEW="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac
          
          echo "new-version=$NEW" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT -> $NEW"

  create-release:
    runs-on: ubuntu-latest
    needs: calculate-version
    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git tag -a v${{ needs.calculate-version.outputs.new-version }} \
            -m "Release v${{ needs.calculate-version.outputs.new-version }}"

      - name: Update version in package.json
        run: |
          npm version ${{ needs.calculate-version.outputs.new-version }} --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add package.json
          git commit -m "chore: bump version to v${{ needs.calculate-version.outputs.new-version }}"
          git push origin main
          git push origin v${{ needs.calculate-version.outputs.new-version }}

  generate-changelog:
    runs-on: ubuntu-latest
    needs: calculate-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          echo "# Changelog" > CHANGELOG_NEW.md
          echo "" >> CHANGELOG_NEW.md
          echo "## [v${{ needs.calculate-version.outputs.new-version }}]" >> CHANGELOG_NEW.md
          echo "" >> CHANGELOG_NEW.md
          git log --oneline HEAD~5..HEAD | sed 's/^/- /' >> CHANGELOG_NEW.md

      - name: Append to existing changelog
        run: |
          cat CHANGELOG_NEW.md CHANGELOG.md > CHANGELOG.md.tmp
          mv CHANGELOG.md.tmp CHANGELOG.md

  publish-release:
    runs-on: ubuntu-latest
    needs: [calculate-version, create-release, generate-changelog]
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.calculate-version.outputs.new-version }}
          body: Release v${{ needs.calculate-version.outputs.new-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post version summary
        run: |
          echo "# Semantic Versioning Release" >> $GITHUB_STEP_SUMMARY
          echo "- Old version: v${{ needs.calculate-version.outputs.old-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- New version: v${{ needs.calculate-version.outputs.new-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type: ${{ github.event.inputs.version-bump || 'patch' }}" >> $GITHUB_STEP_SUMMARY
