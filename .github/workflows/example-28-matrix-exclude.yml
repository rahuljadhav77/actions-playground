# Example 28: Matrix Exclude
# This workflow demonstrates excluding specific matrix combinations.

name: Matrix Exclude Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [16, 18]
        exclude:
          - os: windows-latest
            node-version: 18

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Print matrix values
        run: echo "OS: ${{ matrix.os }}, Node: ${{ matrix.node-version }}"
