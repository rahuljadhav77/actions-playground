name: Example 53 - Audit Logging & Compliance

on:
  push:
    branches: [main]
  pull_request:
#   schedule:
#     - cron: '0 0 * * *'

jobs:
  audit-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create audit log entry
        run: |
          cat > audit.log << 'LOG'
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "event": "workflow_executed",
            "actor": "${{ github.actor }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "commit_sha": "${{ github.sha }}",
            "event_type": "${{ github.event_name }}",
            "action": "code_deployment"
          }
          LOG

      - name: Log user actions
        run: |
          echo "=== Audit Log ==="
          echo "User: ${{ github.actor }}"
          echo "Action: Pushed code to ${{ github.ref }}"
          echo "Timestamp: $(date -u)"
          echo "Commit: ${{ github.sha }}"

      - name: Archive audit logs
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs
          path: audit.log
          retention-days: 365

  compliance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify compliance requirements
        run: |
          echo "# Compliance Status"
          echo "- GDPR: ✅ Compliant"
          echo "- SOC2: ✅ Compliant"
          echo "- HIPAA: ✅ Compliant"
          echo "- PCI-DSS: ✅ Compliant"

      - name: Check data retention policy
        run: |
          echo "Logs retention: 1 year"
          echo "Backup retention: 3 years"
          echo "Access logs: 90 days"

  generate-report:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate compliance report
        run: |
          echo "# Audit & Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "- Audit logging: Enabled" >> $GITHUB_STEP_SUMMARY
          echo "- Log retention: 1 year" >> $GITHUB_STEP_SUMMARY
          echo "- Last audit: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: COMPLIANT" >> $GITHUB_STEP_SUMMARY
