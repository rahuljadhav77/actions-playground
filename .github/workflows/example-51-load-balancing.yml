name: Example 51 - Load Balancing & Traffic Distribution

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze current traffic patterns
        run: |
          echo "# Traffic Analysis"
          echo "- Total requests: 1.2M/day"
          echo "- Peak traffic: 15K req/sec"
          echo "- Average latency: 250ms"
          echo "- Error rate: 0.3%"

      - name: Check server health
        run: |
          echo "Server 1: 95% healthy"
          echo "Server 2: 98% healthy"
          echo "Server 3: 92% healthy"
          echo "Server 4: 97% healthy"

  configure-load-balancer:
    runs-on: ubuntu-latest
    needs: analyze-traffic
    steps:
      - name: Update load balancer config
        run: |
          echo "Configuring traffic distribution..."
          echo "Server 1: 25% traffic"
          echo "Server 2: 30% traffic"
          echo "Server 3: 20% traffic"
          echo "Server 4: 25% traffic"

      - name: Enable health checks
        run: |
          echo "Health check interval: 10s"
          echo "Timeout: 5s"
          echo "Unhealthy threshold: 3"

  validate-distribution:
    runs-on: ubuntu-latest
    needs: configure-load-balancer
    steps:
      - name: Verify load distribution
        run: |
          for i in {1..5}; do
            echo "Health check $i/5..."
            sleep 5
          done
          echo "✅ All servers healthy and balanced"

  monitor-metrics:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate metrics report
        run: |
          echo "# Load Balancing Report" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Active" >> $GITHUB_STEP_SUMMARY
          echo "- Servers: 4" >> $GITHUB_STEP_SUMMARY
          echo "- Avg latency: 248ms" >> $GITHUB_STEP_SUMMARY
          echo "- Distribution: Balanced" >> $GITHUB_STEP_SUMMARY
